version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: healthai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "@Coding1@"
      MYSQL_DATABASE: healthai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: healthai-redis
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:latest
    container_name: healthai-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Isko internal aur external dono listeners ke liye configure kiya hai taaki network binding issue na aaye
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  healthai-backend:
    build: ./HealthAi
    container_name: healthai-backend
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/healthai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "@Coding1@"
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      # Ab backend internal port (29092) par listen karega jo smooth hai
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: dGhpcylzTXlTdXBlclNlY3JldEtleUZvckpXVEF1dGgxMjM0NTY3ODk=
      JWT_EXPIRATION: 900000

  ai-service:
    build: ./healthai-ai-service
    container_name: healthai-ai
    ports:
      - "8085:8085"
    depends_on:
      - kafka
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  # ==================== FRONTEND SERVICE ADDED ====================
  frontend:
    build: ./healthai-frontend
    container_name: healthai-frontend
    ports:
      - "3000:3000"
    depends_on:
      - healthai-backend
      - ai-service
    environment:
      REACT_APP_JAVA_API: http://localhost:8081
      REACT_APP_AI_API: http://localhost:8085

volumes:
  mysql_data: